id: training-openai-api-project
name: Training OpenAI API Project
description: OpenAI-powered training analysis project that calls a company training API and saves approved analysis results.

model:
  provider: openai
  model: gpt-4o-mini
  envApiKey: OPENAI_API_KEY
  baseUrl: https://api.openai.com/v1
  timeoutMs: 60000
  temperature: 0.2
  maxTokens: 1000

connectors:
  - id: company-training-api
    type: api
    name: Company Training API
    config:
      baseUrl: ${TRAINING_API_BASE_URL}
      timeoutMs: 30000
      defaultHeaders:
        x-client-name: agent-bridge-training-openai-example
      auth:
        type: bearer
        token: ${TRAINING_API_TOKEN}
      tools:
        - name: get_training_stats
          description: Get a user's training completion, exam, and overdue-course statistics.
          method: GET
          path: /training/stats
          queryParams:
            - userId
          parameters:
            userId:
              type: string
              description: User id, for example USER-001.
              required: true

        - name: save_training_analysis
          description: Save the AI-generated training analysis result back to the company system.
          method: POST
          path: /training/analysis
          bodyParams:
            - userId
            - standardId
            - scoreLevel
            - riskLevel
            - summary
            - recommendations
            - evidence
          parameters:
            userId:
              type: string
              description: User id, for example USER-001.
              required: true
            standardId:
              type: string
              description: Analysis standard identifier.
              required: true
            scoreLevel:
              type: string
              description: Result level.
              enum: [excellent, qualified, needs_attention]
              required: true
            riskLevel:
              type: string
              description: Risk level.
              enum: [low, medium, high]
              required: true
            summary:
              type: string
              description: Human-readable analysis summary.
              required: true
            recommendations:
              type: array
              description: Suggested next actions.
              required: true
              items:
                type: string
                description: One recommendation.
            evidence:
              type: object
              description: Key training metrics used by the analysis.
              required: true
              properties:
                completionRate:
                  type: number
                  description: Completed required courses divided by required courses.
                  required: true
                averageScore:
                  type: number
                  description: Average exam score.
                  required: true
                overdueCourses:
                  type: number
                  description: Number of overdue required courses.
                  required: true
                requiredCourses:
                  type: number
                  description: Number of required courses.
                  required: true
                completedCourses:
                  type: number
                  description: Number of completed required courses.
                  required: true

analysis:
  standardId: annual-compliance-2026
  levels:
    - level: excellent
      riskLevel: low
      when:
        completionRate:
          gte: 0.9
        averageScore:
          gte: 85
        overdueCourses:
          eq: 0
      recommendations:
        - Keep the current learning cadence and consider assigning advanced courses.
    - level: qualified
      riskLevel: medium
      when:
        completionRate:
          gte: 0.75
        averageScore:
          gte: 70
      recommendations:
        - Follow up on overdue courses and review weak knowledge areas.
  fallback:
    level: needs_attention
    riskLevel: high
    recommendations:
      - Create a remediation plan and schedule manager follow-up.
      - Prioritize required courses with low completion or low exam scores.

systemPrompt: |
  You are a training analytics assistant for an enterprise learning platform.
  When asked to analyze a user's training status, first call get_training_stats.
  Compare the statistics against the injected Analysis configuration JSON.
  Save the structured result by calling save_training_analysis.
  The saved scoreLevel must be one of: excellent, qualified, needs_attention.
  The saved riskLevel must be one of: low, medium, high.
  Never invent training statistics. Use company API data as the source of truth.

toolPolicy:
  maxConsecutiveCalls: 6
  confirmationRules:
    - tool: save_training_analysis
      requireConfirmation: true

memory:
  enabled: true
  maxMessages: 20
  type: sliding
