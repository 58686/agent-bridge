id: openai-example-project
name: OpenAI Example Project
description: Minimal OpenAI-powered agent-bridge project for smoke testing model calls.

model:
  provider: openai
  model: gpt-4o-mini
  envApiKey: OPENAI_API_KEY
  baseUrl: https://api.openai.com/v1
  timeoutMs: 60000
  temperature: 0.2
  maxTokens: 800

connectors:
  - id: echo-demo
    type: echo
    name: Echo Demo Connector
    config:
      projectName: demo

systemPrompt: |
  You are a general-purpose internal agent.
  Use tools when they can provide more accurate information.
  Do not invent company records.

toolPolicy:
  maxConsecutiveCalls: 5
  requireConfirmation: false

memory:
  enabled: true
  maxMessages: 20
  type: sliding
