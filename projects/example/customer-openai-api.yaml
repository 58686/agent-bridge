id: customer-openai-api-project
name: Customer OpenAI API Project
description: Example OpenAI + REST API project for customer or ticket workflows.

model:
  provider: openai
  model: gpt-4o-mini
  envApiKey: OPENAI_API_KEY
  baseUrl: https://api.openai.com/v1
  timeoutMs: 60000
  temperature: 0.2
  maxTokens: 800

connectors:
  - id: company-api
    type: api
    name: Company API Connector
    config:
      baseUrl: ${COMPANY_API_BASE_URL}
      timeoutMs: 30000
      defaultHeaders:
        x-client-name: agent-bridge
      auth:
        type: bearer
        token: ${COMPANY_API_TOKEN}
      tools:
        - name: get_ticket
          description: Get ticket details by ticket id.
          method: GET
          path: /tickets/detail
          queryParams:
            - ticketId
          parameters:
            ticketId:
              type: string
              description: Ticket id.
              required: true
        - name: create_comment
          description: Add a comment to a ticket.
          method: POST
          path: /tickets/comment
          bodyParams:
            - ticketId
            - content
          parameters:
            ticketId:
              type: string
              description: Ticket id.
              required: true
            content:
              type: string
              description: Comment content.
              required: true

systemPrompt: |
  You are an internal company support agent.
  Use company API tools for factual ticket data.
  Do not invent ticket details.
  Ask for confirmation before writing to company systems.

toolPolicy:
  maxConsecutiveCalls: 5
  confirmationTimeoutMs: 900000
  confirmationRules:
    - tool: create_comment
      requireConfirmation: true

memory:
  enabled: true
  maxMessages: 20
  type: sliding
