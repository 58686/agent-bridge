id: company-api-project
name: Company API Project
description: 使用通用 API Connector 对接公司内部 REST 服务的示例配置
model:
  provider: custom
  model: mock-model
connectors:
  - id: company-api
    type: api
    name: Company API Connector
    config:
      baseUrl: https://example.internal.api/
      defaultHeaders:
        x-client-name: agent-bridge
      auth:
        type: bearer
        token: YOUR_API_TOKEN
      tools:
        - name: get_ticket
          description: 根据工单 ID 查询工单详情
          method: GET
          path: /tickets/detail
          queryParams:
            - ticketId
          parameters:
            ticketId:
              type: string
              description: 工单 ID
              required: true
        - name: create_comment
          description: 为工单新增评论
          method: POST
          path: /tickets/comment
          bodyParams:
            - ticketId
            - content
          parameters:
            ticketId:
              type: string
              description: 工单 ID
              required: true
            content:
              type: string
              description: 评论内容
              required: true
systemPrompt: |
  你是一个企业内部系统 Agent。
  当需要查询或更新业务数据时，优先调用 API 工具，而不是凭空回答。
toolPolicy:
  maxConsecutiveCalls: 5
  confirmationTimeoutMs: 900000
  requireConfirmation: true
