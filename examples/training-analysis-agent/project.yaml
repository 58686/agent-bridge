id: training-analysis-agent
name: Training Analysis Agent
description: A runnable example that fetches employee training statistics, asks AI to analyze them against a configurable standard, and saves the result through a company API.

model:
  provider: custom
  model: mock-model
  # For a real OpenAI or OpenAI-compatible model, use:
  # provider: openai
  # model: gpt-4o-mini
  # envApiKey: OPENAI_API_KEY
  # timeoutMs: 60000
  # baseUrl: https://api.openai.com/v1

connectors:
  - id: company-training-api
    type: api
    name: Company Training API
    config:
      baseUrl: ${TRAINING_API_BASE_URL}
      timeoutMs: 30000
      defaultHeaders:
        x-client-name: agent-bridge-training-example
      auth:
        type: bearer
        token: ${TRAINING_API_TOKEN}
      tools:
        - name: get_training_stats
          description: Get a user's training completion, exam, and overdue-course statistics.
          method: GET
          path: /training/stats
          queryParams:
            - userId
          parameters:
            userId:
              type: string
              description: User id, for example USER-001.
              required: true

        - name: save_training_analysis
          description: Save the AI-generated training analysis result back to the company system.
          method: POST
          path: /training/analysis
          bodyParams:
            - userId
            - standardId
            - scoreLevel
            - riskLevel
            - summary
            - recommendations
            - evidence
          parameters:
            userId:
              type: string
              description: User id, for example USER-001.
              required: true
            standardId:
              type: string
              description: Analysis standard identifier.
              required: true
            scoreLevel:
              type: string
              description: Result level such as excellent, qualified, or needs_attention.
              required: true
            riskLevel:
              type: string
              description: Risk level such as low, medium, or high.
              required: true
            summary:
              type: string
              description: Human-readable analysis summary.
              required: true
            recommendations:
              type: array
              description: Suggested next actions.
              required: true
            evidence:
              type: object
              description: Key training metrics used by the analysis.
              required: true

analysis:
  standardId: annual-compliance-2026
  levels:
    - level: excellent
      riskLevel: low
      when:
        completionRate:
          gte: 0.9
        averageScore:
          gte: 85
        overdueCourses:
          eq: 0
      recommendations:
        - Keep the current learning cadence and consider assigning advanced courses.
    - level: qualified
      riskLevel: medium
      when:
        completionRate:
          gte: 0.75
        averageScore:
          gte: 70
      recommendations:
        - Follow up on overdue courses and review weak knowledge areas.
  fallback:
    level: needs_attention
    riskLevel: high
    recommendations:
      - Create a remediation plan and schedule manager follow-up.
      - Prioritize required courses with low completion or low exam scores.

systemPrompt: |
  You are a training analytics assistant for an enterprise learning platform.
  When asked to analyze a user's training status, first call get_training_stats.
  Then compare the statistics against the injected Analysis configuration JSON.
  Save the structured result by calling save_training_analysis.
  Never invent training statistics. Use company API data as the source of truth.

toolPolicy:
  maxConsecutiveCalls: 6
  confirmationRules:
    - tool: save_training_analysis
      requireConfirmation: true

memory:
  enabled: true
  maxMessages: 20
  type: sliding
